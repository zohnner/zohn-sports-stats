<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060c18">
    <meta name="description" content="SportsStrata — Serious stats for serious fans. Real-time MLB analytics, standings, player stats, splits, and live scores.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SportsStrata">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <!-- CSP meta-tag fallback (edge _headers file is the primary enforcement layer) -->
    <!-- connect-src: swap https://api.balldontlie.io → Worker URL once deployed -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://a.espncdn.com https://www.mlbstatic.com https://img.mlbstatic.com https://assets.nhle.com; connect-src 'self' https://api.balldontlie.io https://site.api.espn.com https://stats.nba.com https://statsapi.mlb.com https://baseballsavant.mlb.com https://api-web.nhle.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <title>SportsStrata — Serious Stats for Serious Fans</title>
    <!-- Anti-FOWT: set data-theme before first paint so CSS variables are correct immediately -->
    <script>
        (function(){
            var s = localStorage.getItem('zs_theme');
            if (!s) s = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', s);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet">
    <!-- Design tokens first so all stylesheets can reference variables -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/ticker.css">
    <link rel="stylesheet" href="css/arcade.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <button class="brand" onclick="navigateTo('home')" aria-label="SportsStrata home">
                <span class="brand-icon" id="brandIcon">⚾</span>
                <div class="brand-text">
                    <span class="brand-name">SportsStrata</span>
                    <span class="brand-sub" id="brandSub">MLB Analytics</span>
                </div>
            </button>

            <!-- Live scores ticker (fills remaining header space) -->
            <div class="header-ticker">
                <button class="ticker-title" id="tickerScoresBtn" title="View all scores">SCORES</button>
                <div class="ticker" id="scoreTicker">
                    <div class="ticker__item">Loading scores…</div>
                </div>
            </div>

            <!-- Global search button (⌘K) -->
            <button class="search-global-btn" id="globalSearchBtn" title="Search (⌘K)" aria-label="Search players and teams">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Waffle / nav menu button -->
            <button class="waffle-btn" id="waffleBtn"
                    aria-label="Navigation menu" aria-expanded="false" aria-controls="wafflePanel">
                <span class="waffle-icon"></span>
            </button>
        </div>
    </header>

    <!-- Waffle navigation panel (sticky below header) -->
    <div class="waffle-panel" id="wafflePanel" hidden>
        <div class="waffle-panel-inner">

            <!-- Hidden stubs so JS sport-switcher logic doesn't error -->
            <nav id="nba-nav" style="display:none" hidden aria-hidden="true"></nav>
            <nav id="nfl-nav" style="display:none" hidden aria-hidden="true"></nav>
            <nav id="nhl-nav" style="display:none" hidden aria-hidden="true"></nav>
            <div id="waffleSeasonRow" style="display:none" hidden></div>
            <select id="seasonSelect" style="display:none" hidden></select>

            <!-- MLB navigation -->
            <div class="waffle-section-label">⚾ MLB</div>
            <nav class="waffle-nav" id="mlb-nav" aria-label="MLB navigation">
                <button class="nav-tab waffle-nav-item" data-view="mlb-players">
                    <span class="nav-icon">👤</span>
                    <span>Players</span>
                </button>
                <button class="nav-tab waffle-nav-item" data-view="mlb-leaders">
                    <span class="nav-icon">🏆</span>
                    <span>Leaders</span>
                </button>
                <button class="nav-tab waffle-nav-item" data-view="mlb-teams">
                    <span class="nav-icon">🏟</span>
                    <span>Teams</span>
                </button>
                <button class="nav-tab waffle-nav-item" data-view="mlb-games">
                    <span class="nav-icon">📅</span>
                    <span>Scores</span>
                </button>
                <button class="nav-tab waffle-nav-item" data-view="mlb-standings">
                    <span class="nav-icon">📊</span>
                    <span>Standings</span>
                </button>
                <button class="nav-tab waffle-nav-item" data-view="mlb-builder">
                    <span class="nav-icon">🧮</span>
                    <span>Builder</span>
                </button>
                <button class="nav-tab waffle-nav-item" data-view="mlb-prep">
                    <span class="nav-icon">📋</span>
                    <span>Game Prep</span>
                </button>
            </nav>

            <!-- Universal navigation (always visible) -->
            <div class="waffle-universal-section">
                <div class="waffle-section-label">Platform</div>
                <nav class="waffle-nav waffle-nav--universal" aria-label="Platform navigation">
                    <button class="nav-tab waffle-nav-item" data-view="arcade">
                        <span class="nav-icon">🎮</span>
                        <span>Arcade</span>
                    </button>
                </nav>
            </div>

        </div>

        <!-- Footer: theme toggle -->
        <div class="waffle-panel-footer">
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
                <span class="theme-toggle-icon" id="themeToggleIcon">☀️</span>
                <span id="themeToggleLabel">Light mode</span>
            </button>
        </div>

    </div>


    <!-- Global search overlay — opened by ⌘K or the search button -->
    <div class="search-overlay" id="searchOverlay" hidden role="dialog" aria-modal="true" aria-label="Search players and teams">
        <div class="search-modal">
            <div class="search-modal-bar">
                <svg class="search-modal-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input class="search-modal-input" id="searchModalInput"
                       type="text" placeholder="Search players and teams…"
                       autocomplete="off" spellcheck="false" aria-label="Search">
                <button class="search-modal-close" id="searchModalClose" aria-label="Close search">✕</button>
            </div>
            <div class="search-modal-results" id="searchModalResults"></div>
            <div class="search-modal-footer">
                <span><kbd>↑↓</kbd> navigate</span>
                <span><kbd>↵</kbd> open</span>
                <span><kbd>Esc</kbd> close</span>
            </div>
        </div>
    </div>

    <!-- Hidden stubs so JS nav-switching logic doesn't error -->
    <nav id="mobile-nba-nav" style="display:none" hidden aria-hidden="true"></nav>
    <nav id="mobile-nfl-nav" style="display:none" hidden aria-hidden="true"></nav>
    <nav id="mobile-nhl-nav" style="display:none" hidden aria-hidden="true"></nav>
    <nav class="mobile-nav" id="mobile-mlb-nav" aria-label="Mobile MLB navigation">
        <button class="nav-tab" data-view="mlb-players">
            <span class="nav-icon">👤</span>
            <span class="mobile-nav-label">Players</span>
        </button>
        <button class="nav-tab" data-view="mlb-leaders">
            <span class="nav-icon">🏆</span>
            <span class="mobile-nav-label">Leaders</span>
        </button>
        <button class="nav-tab" data-view="mlb-games">
            <span class="nav-icon">📅</span>
            <span class="mobile-nav-label">Scores</span>
        </button>
        <button class="nav-tab" data-view="mlb-standings">
            <span class="nav-icon">📊</span>
            <span class="mobile-nav-label">Standings</span>
        </button>
        <button class="nav-tab" data-view="mlb-builder">
            <span class="nav-icon">🧮</span>
            <span class="mobile-nav-label">Builder</span>
        </button>
        <button class="nav-tab" data-view="mlb-prep">
            <span class="nav-icon">📋</span>
            <span class="mobile-nav-label">Prep</span>
        </button>
    </nav>

    <!-- Back to top button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <main>
        <!-- Search + filters — shown only on Players view -->
        <div class="search-container" id="searchBar">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchBox" placeholder="Search players by name or team…">
                <button class="search-clear" id="searchClear" style="display:none">✕</button>
            </div>
            <div class="search-meta">
                <p id="resultCount">Loading players…</p>
                <div class="view-toggle">
                    <button class="fav-filter-btn" id="favFilterBtn" onclick="toggleFavFilter()" title="Show favorites only">♥ Starred</button>
                    <button class="view-toggle-btn active" id="cardViewBtn" onclick="setPlayerView('cards')" title="Card view">⊞</button>
                    <button class="view-toggle-btn" id="tableViewBtn" onclick="setPlayerView('table')" title="Table view">≡</button>
                </div>
            </div>
        </div>

        <!-- Breadcrumb / status bar — shown on all non-search views -->
        <div class="view-header" id="viewHeader" style="display:none">
            <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>

        <div id="playersGrid" class="players-grid"></div>
    </main>

    <!-- math.js: safe formula evaluation in Stat Builder (never use eval()) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"
            integrity="sha512-VMIzok05yICztVJ0Pu2ZXHHz6Pe+fNONIcepOD3kzgL0SJG3GH4IO3DmBRO766hIWUOHIS/IWdSqRGWWzgzqRw=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Chart.js: data visualisation — loaded before charts.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
            integrity="sha384-NrKB+u6Ts6AtkIhwPixiKTzgSKNblyhlk0Sohlgar9UHUBzai/sgnNNWWd291xqt"
            crossorigin="anonymous"></script>

    <!-- App scripts — order matters (no bundler, no ES modules) -->
    <script src="js/config.js"></script>
    <script src="js/errorHandler.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/api.js"></script>
    <script src="js/glossary.js"></script>
    <script src="js/players.js"></script>
    <script src="js/leaderboards.js"></script>
    <script src="js/teams.js"></script>
    <script src="js/games.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/playerDetail.js"></script>
    <script src="js/statBuilder.js"></script>
    <script src="js/mlb.js"></script>
    <script src="js/nfl.js"></script>
    <script src="js/nhl.js"></script>
    <script src="js/arcade.js"></script>
    <script src="js/standings.js"></script>
    <script src="js/schema.js"></script>
    <script src="js/db.js"></script>
    <script src="js/search.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
