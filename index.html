<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zohn Sports Stats</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/ticker.css"> 
</head>
<body>
    <header>
        <h1>🏀 Zohn Sports Stats</h1>
        <p>NBA Statistics & Analytics Platform</p>
        <nav class="nav-tabs">
            <button class="nav-tab active" data-view="players">Players</button>
            <button class="nav-tab" data-view="teams">Teams</button>
            <button class="nav-tab" data-view="games">Games</button>
            <button class="nav-tab" data-view="builder">Stat Builder</button>
        </nav>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-title">RECENT SCORES</div>
        <div class="ticker" id="scoreTicker">
            <div class="ticker__item">Loading live scores...</div>
        </div>
    </div>

    <main>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Search players...">
            <p id="resultCount">Loading players...</p>
        </div>

        <div id="playersGrid" class="players-grid">
            </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/players.js"></script>
    <script src="js/teams.js"></script>
    <script src="js/games.js"></script>
    <script src="js/playerDetail.js"></script>
    <script src="js/statBuilder.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
