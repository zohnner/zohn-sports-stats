<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060c18">
    <meta name="description" content="SportStrata — Serious stats for serious fans. Real-time MLB analytics, standings, player stats, splits, and live scores.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SportStrata">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" sizes="64x64" href="assets/icon-64.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <!-- CSP meta-tag fallback (edge _headers file is the primary enforcement layer) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://a.espncdn.com https://sleepercdn.com https://*.mlbstatic.com https://assets.nhle.com https://staticassets.mlb.com; connect-src 'self' https://sportsstrata-proxy.zohnwheeler.workers.dev https://sportsstrata-blurb.zohnwheeler.workers.dev https://api.balldontlie.io https://site.api.espn.com https://stats.nba.com https://statsapi.mlb.com https://baseballsavant.mlb.com https://api-web.nhle.com https://api.open-meteo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <title>SportStrata — Serious Stats for Serious Fans</title>
    <!-- OG / SEO — updated dynamically by navigation.js on each route change -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="SportStrata">
    <meta id="ogTitle"       property="og:title"       content="SportStrata — Serious Stats for Serious Fans">
    <meta id="ogDescription" property="og:description" content="Real-time MLB analytics, standings, player stats, splits, and live scores.">
    <meta id="ogUrl"         property="og:url"         content="">
    <link id="canonicalLink" rel="canonical"            href="">
    <!-- Anti-FOWT: set data-theme before first paint so CSS variables are correct immediately -->
    <script>
        (function(){
            var theme = 'dark';
            try {
                var stored = localStorage.getItem('zs_theme');
                theme = stored != null ? stored : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            } catch (_) {}
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"></noscript>
    <!-- Design tokens first so all stylesheets can reference variables -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/ticker.css">
    <link rel="stylesheet" href="css/arcade.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/scorecard.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/liveGame.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/shareCard.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="css/arcade.css"><link rel="stylesheet" href="css/scorecard.css"><link rel="stylesheet" href="css/liveGame.css"><link rel="stylesheet" href="css/shareCard.css"></noscript>
</head>
<body>

    <header>
        <div class="header-inner">
            <button class="brand" onclick="navigateTo('home')" aria-label="SportStrata home">
                <img class="brand-logo-img" src="assets/icon-64.png" width="64" height="64" alt="SportStrata">
                <span id="brandIcon" hidden></span>
                <div class="brand-text">
                    <span class="brand-name">SportStrata</span>
                    <span class="brand-sub" id="brandSub">MLB Analytics</span>
                </div>
            </button>

            <!-- Sport switcher (MLB / NFL) -->
            <div class="sport-switch" role="group" aria-label="Choose sport">
                <button class="sport-switch-btn sport-switch-btn--active" data-sport="mlb" aria-pressed="true">MLB</button>
                <button class="sport-switch-btn" data-sport="nfl" aria-pressed="false">NFL</button>
            </div>

            <!-- Global search button (⌘K) — expands on desktop -->
            <button class="search-global-btn" id="globalSearchBtn" data-label="Search players, teams, stats…" title="Search (⌘K)" aria-label="Search players and teams">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Settings -->
            <button class="settings-btn" id="settingsBtn" onclick="openSettingsPanel()" title="Settings" aria-label="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </button>

            <!-- Menu button (mobile only) -->
            <button class="menu-btn" id="menuBtn"
                    aria-label="Navigation menu" aria-expanded="false" aria-controls="menuPanel">
                <span class="menu-icon"></span>
            </button>
        </div>

        <!-- Live scores ticker — own row between top bar and sub-nav -->
        <div class="header-ticker">
            <button class="ticker-title nav-tab" id="tickerScoresBtn" data-view="mlb-games" title="View all scores">SCORES</button>
            <div class="ticker" id="scoreTicker">
                <div class="ticker__item">Loading scores…</div>
            </div>
        </div>

        <!-- Sub-nav: persistent horizontal nav bar (desktop) -->
        <nav class="sub-nav" id="subNav" aria-label="MLB navigation">
            <button class="nav-tab sub-nav-item" data-view="mlb-players">Players</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-leaders">Leaders</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-teams">Teams</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-standings">Standings</button>
            <span class="sub-nav-divider" aria-hidden="true"></span>
            <button class="nav-tab sub-nav-item" data-view="mlb-prep">Prep</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-builder">Builder</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-compare">Compare</button>
            <button class="nav-tab sub-nav-item" data-view="arcade">Arcade</button>
        </nav>
    </header>

    <!-- Menu panel (mobile dropdown, fixed below header + ticker) -->
    <div class="menu-panel" id="menuPanel" hidden aria-label="Navigation menu">
        <nav class="menu-grid" aria-label="MLB navigation">
            <button class="nav-tab menu-item" data-view="mlb-players">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="5" r="2.5"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg></span>
                <span>Players</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-leaders">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 2h6v4a3 3 0 01-6 0V2z"/><path d="M5 5H3a2 2 0 002 2"/><path d="M11 5h2a2 2 0 01-2 2"/><path d="M8 9v2.5M6 13h4"/></svg></span>
                <span>Leaders</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-teams">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 1.5L2.5 4v4C2.5 11.5 5 14 8 15c3-1 5.5-3.5 5.5-7V4L8 1.5z"/></svg></span>
                <span>Teams</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-games">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3.5" width="12" height="10.5" rx="1.5"/><path d="M2 7.5h12M5.5 1.5v4M10.5 1.5v4"/></svg></span>
                <span>Scores</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-standings">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 13.5V10M7 13.5V6M11.5 13.5V3"/><path d="M1.5 13.5h13"/></svg></span>
                <span>Standings</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-builder">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 2L14 5 6 13H3v-3L11 2z"/><path d="M9 4l3 3"/></svg></span>
                <span>Builder</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-prep">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="10" height="11" rx="1"/><path d="M6.5 3a1.5 1.5 0 013 0"/><path d="M5.5 7.5h5M5.5 10.5h3.5"/></svg></span>
                <span>Prep</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-compare">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="3" width="5" height="10" rx="1"/><rect x="9.5" y="3" width="5" height="10" rx="1"/></svg></span>
                <span>Compare</span>
            </button>
            <button class="nav-tab menu-item" data-view="arcade">
                <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="4.5" width="13" height="7" rx="2.5"/><path d="M5 8h2M6 7v2"/><circle cx="11" cy="7.5" r="0.75" fill="currentColor" stroke="none"/><circle cx="13" cy="7.5" r="0.75" fill="currentColor" stroke="none"/></svg></span>
                <span>Arcade</span>
            </button>
        </nav>
        <div class="menu-panel-footer">
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="openSettingsPanel()">
                <span class="theme-toggle-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
                <span>Settings</span>
            </button>
        </div>
    </div>
    <!-- Settings panel — right-side drawer -->
    <div class="settings-panel" id="settingsPanel" hidden role="dialog" aria-modal="true" aria-label="Settings">
        <div class="settings-panel-backdrop" id="settingsPanelBackdrop"></div>
        <div class="settings-panel-drawer">
            <div class="settings-panel-header">
                <span class="settings-panel-title">Settings</span>
                <button class="settings-panel-close" id="settingsPanelClose" aria-label="Close settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="settings-panel-body">
                <section class="settings-section">
                    <p class="settings-section-label">Appearance</p>
                    <div class="theme-swatch-grid">
                        <button class="theme-swatch" data-theme-set="dark" aria-pressed="false" aria-label="Dark theme">
                            <div class="swatch-preview"></div>
                            <span class="swatch-label">Dark</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="light" aria-pressed="false" aria-label="Light theme">
                            <div class="swatch-preview"></div>
                            <span class="swatch-label">Light</span>
                        </button>
                    </div>

                    <p class="settings-subsection-label">City Connect 2026</p>
                    <div class="theme-swatch-grid theme-swatch-grid--cc">
                        <button class="theme-swatch" data-theme-set="cc-braves" aria-pressed="false" aria-label="Atlanta Braves City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">ATL</span></div>
                            <span class="swatch-label">Braves</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-orioles" aria-pressed="false" aria-label="Baltimore Orioles City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">BAL</span></div>
                            <span class="swatch-label">Orioles</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-reds" aria-pressed="false" aria-label="Cincinnati Reds City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">CIN</span></div>
                            <span class="swatch-label">Reds</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-royals" aria-pressed="false" aria-label="Kansas City Royals Forever Fountains City Connect">
                            <div class="swatch-preview swatch-preview--logo"><img src="assets/themes/royals-cc-forever.jpg" alt="KC Royals CC" loading="lazy" data-hide-on-error></div>
                            <span class="swatch-label">Royals</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-brewers" aria-pressed="false" aria-label="Milwaukee Brewers City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">MIL</span></div>
                            <span class="swatch-label">Brewers</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-pirates" aria-pressed="false" aria-label="Pittsburgh Pirates City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">PIT</span></div>
                            <span class="swatch-label">Pirates</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-padres" aria-pressed="false" aria-label="San Diego Padres City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">SD</span></div>
                            <span class="swatch-label">Padres</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="cc-rangers" aria-pressed="false" aria-label="Texas Rangers City Connect">
                            <div class="swatch-preview"><span class="swatch-abbr">TEX</span></div>
                            <span class="swatch-label">Rangers</span>
                        </button>
                    </div>

                    <p class="settings-subsection-label">Historical & Tribute</p>
                    <div class="theme-swatch-grid">
                        <button class="theme-swatch" data-theme-set="cc-bananas" aria-pressed="false" aria-label="Savannah Bananas">
                            <div class="swatch-preview swatch-preview--logo"><img src="assets/themes/SavannahBananas.png" alt="Savannah Bananas" loading="lazy" data-hide-on-error></div>
                            <span class="swatch-label">Bananas</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="retro-expos" aria-pressed="false" aria-label="Montreal Expos Retro">
                            <div class="swatch-preview swatch-preview--logo"><img src="assets/themes/exposlogo.webp" alt="Montreal Expos" loading="lazy" data-hide-on-error></div>
                            <span class="swatch-label">Expos</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="nl-monarchs" aria-pressed="false" aria-label="Kansas City Monarchs — Negro Leagues">
                            <div class="swatch-preview swatch-preview--logo"><img src="assets/themes/images.png" alt="KC Monarchs" loading="lazy" data-hide-on-error></div>
                            <span class="swatch-label">Monarchs</span>
                        </button>
                        <button class="theme-swatch" data-theme-set="aa-trash-pandas" aria-pressed="false" aria-label="Rocket City Trash Pandas">
                            <div class="swatch-preview swatch-preview--logo"><img src="assets/themes/trash-pandas-logo.png" alt="Rocket City Trash Pandas" loading="lazy" data-hide-on-error></div>
                            <span class="swatch-label">Trash Pandas</span>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Keep for app.js season logic compatibility -->
    <select id="seasonSelect" style="display:none" hidden></select>


    <!-- Global search overlay — opened by ⌘K or the search button -->
    <div class="search-overlay" id="searchOverlay" hidden role="dialog" aria-modal="true" aria-label="Search players and teams">
        <div class="search-modal">
            <div class="search-modal-bar">
                <svg class="search-modal-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input class="search-modal-input" id="searchModalInput"
                       type="text" placeholder="Search players and teams…"
                       autocomplete="off" spellcheck="false" aria-label="Search">
                <button class="search-modal-close" id="searchModalClose" aria-label="Close search">✕</button>
            </div>
            <div class="search-modal-results" id="searchModalResults"></div>
            <div class="search-modal-footer">
                <span><kbd>↑↓</kbd> navigate</span>
                <span><kbd>↵</kbd> open</span>
                <span><kbd>Esc</kbd> close</span>
            </div>
        </div>
    </div>

    <!-- Bottom tab bar (mobile only, 5 primary destinations) -->

        <button class="nav-tab" data-view="mlb-players">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="5" r="2.5"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg></span>
            <span class="bottom-nav-label">Players</span>

        <button class="nav-tab" data-view="mlb-leaders">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 2h6v4a3 3 0 01-6 0V2z"/><path d="M5 5H3a2 2 0 002 2"/><path d="M11 5h2a2 2 0 01-2 2"/><path d="M8 9v2.5M6 13h4"/></svg></span>
            <span class="bottom-nav-label">Leaders</span>
        </button>
        <button class="nav-tab" data-view="mlb-games">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3.5" width="12" height="10.5" rx="1.5"/><path d="M2 7.5h12M5.5 1.5v4M10.5 1.5v4"/></svg></span>
            <span class="bottom-nav-label">Scores</span>
        </button>
        <button class="nav-tab" data-view="mlb-standings">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 13.5V10M7 13.5V6M11.5 13.5V3"/><path d="M1.5 13.5h13"/></svg></span>
            <span class="bottom-nav-label">Standings</span>
        </button>
        <button class="nav-tab" data-view="mlb-prep">
            <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="10" height="11" rx="1"/><path d="M6.5 3a1.5 1.5 0 013 0"/><path d="M5.5 7.5h5M5.5 10.5h3.5"/></svg></span>
            <span class="bottom-nav-label">Prep</span>
        </button>
    </nav>

    <!-- Back to top button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <main>
        <!-- Search + filters — shown only on Players view -->
        <div class="search-container" id="searchBar">
            <div class="search-input-wrap">
                <span class="search-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
                <input type="text" id="searchBox" placeholder="Search players by name or team…">
                <button class="search-clear" id="searchClear" style="display:none">✕</button>
            </div>
            <div class="search-meta">
                <p id="resultCount">Loading players…</p>
                <div class="view-toggle">
                    <button class="fav-filter-btn" id="favFilterBtn" onclick="toggleFavFilter()" title="Show favorites only">♥ Starred</button>
                    <button class="view-toggle-btn active" id="cardViewBtn" onclick="setPlayerView('cards')" title="Card view">⊞</button>
                    <button class="view-toggle-btn" id="tableViewBtn" onclick="setPlayerView('table')" title="Table view">≡</button>
                </div>
            </div>
        </div>

        <!-- Breadcrumb / status bar — shown on all non-search views -->
        <div class="view-header" id="viewHeader" style="display:none">
            <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>

        <div id="playersGrid" class="players-grid"></div>
    </main>

    <!-- math.js 13: safe formula evaluation in Stat Builder (never use eval()) -->
    <!-- Chart.js: data visualisation — loaded before charts.js -->

            crossorigin="anonymous"></script>

    <!-- App scripts — order matters (no bundler, no ES modules) -->
