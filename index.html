<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060c18">
    <meta name="description" content="SportsStrata — Serious stats for serious fans. Real-time MLB analytics, standings, player stats, splits, and live scores.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SportsStrata">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <!-- CSP meta-tag fallback (edge _headers file is the primary enforcement layer) -->
    <!-- connect-src: swap https://api.balldontlie.io → Worker URL once deployed -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://a.espncdn.com https://*.mlbstatic.com https://assets.nhle.com https://staticassets.mlb.com; connect-src 'self' https://api.balldontlie.io https://site.api.espn.com https://stats.nba.com https://statsapi.mlb.com https://baseballsavant.mlb.com https://api-web.nhle.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <title>SportsStrata — Serious Stats for Serious Fans</title>
    <!-- Anti-FOWT: set data-theme before first paint so CSS variables are correct immediately -->
    <script>
        (function(){
            var s = localStorage.getItem('zs_theme');
            if (!s) s = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', s);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <!-- Design tokens first so all stylesheets can reference variables -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/ticker.css">
    <link rel="stylesheet" href="css/arcade.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <button class="brand" onclick="navigateTo('home')" aria-label="SportsStrata home">
                <img class="brand-logo-img" src="assets/Icon.PNG" alt="SportsStrata">
                <span id="brandIcon" hidden></span>
                <div class="brand-text">
                    <span class="brand-name">SportsStrata</span>
                    <span class="brand-sub" id="brandSub">MLB Analytics</span>
                </div>
            </button>

            <!-- Global search button (⌘K) — expands on desktop -->
            <button class="search-global-btn" id="globalSearchBtn" title="Search (⌘K)" aria-label="Search players and teams">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Theme toggle -->
            <button class="theme-btn-header" id="themeToggleHeaderBtn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark mode">
                <span id="themeToggleHeaderIcon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </span>
            </button>

            <!-- Menu button (mobile only) -->
            <button class="menu-btn" id="menuBtn"
                    aria-label="Navigation menu" aria-expanded="false" aria-controls="menuPanel">
                <span class="menu-icon"></span>
            </button>
        </div>

        <!-- Live scores ticker — own row between top bar and sub-nav -->
        <div class="header-ticker">
            <button class="ticker-title" id="tickerScoresBtn" title="View all scores">SCORES</button>
            <div class="ticker" id="scoreTicker">
                <div class="ticker__item">Loading scores…</div>
            </div>
        </div>

        <!-- Sub-nav: persistent horizontal nav bar (desktop) -->
        <nav class="sub-nav" id="subNav" aria-label="MLB navigation">
            <button class="nav-tab sub-nav-item" data-view="mlb-players">Players</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-leaders">Leaders</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-teams">Teams</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-games">Scores</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-standings">Standings</button>
            <span class="sub-nav-divider" aria-hidden="true"></span>
            <button class="nav-tab sub-nav-item" data-view="mlb-builder">Builder</button>
            <button class="nav-tab sub-nav-item" data-view="mlb-prep">Prep</button>
            <button class="nav-tab sub-nav-item" data-view="arcade">Arcade</button>
        </nav>
    </header>

    <!-- Menu panel (mobile dropdown, fixed below header + ticker) -->
    <div class="menu-panel" id="menuPanel" hidden aria-label="Navigation menu">
        <nav class="menu-grid" aria-label="MLB navigation">
            <button class="nav-tab menu-item" data-view="mlb-players">
                <span class="nav-icon">👤</span>
                <span>Players</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-leaders">
                <span class="nav-icon">🏆</span>
                <span>Leaders</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-teams">
                <span class="nav-icon">🏟</span>
                <span>Teams</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-games">
                <span class="nav-icon">📅</span>
                <span>Scores</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-standings">
                <span class="nav-icon">📊</span>
                <span>Standings</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-builder">
                <span class="nav-icon">🧮</span>
                <span>Builder</span>
            </button>
            <button class="nav-tab menu-item" data-view="mlb-prep">
                <span class="nav-icon">📋</span>
                <span>Prep</span>
            </button>
            <button class="nav-tab menu-item" data-view="arcade">
                <span class="nav-icon">🎮</span>
                <span>Arcade</span>
            </button>
        </nav>
        <div class="menu-panel-footer">
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
                <span class="theme-toggle-icon" id="themeToggleIcon">☀️</span>
                <span id="themeToggleLabel">Light mode</span>
            </button>
        </div>
    </div>
    <!-- Keep for app.js season logic compatibility -->
    <select id="seasonSelect" style="display:none" hidden></select>


    <!-- Global search overlay — opened by ⌘K or the search button -->
    <div class="search-overlay" id="searchOverlay" hidden role="dialog" aria-modal="true" aria-label="Search players and teams">
        <div class="search-modal">
            <div class="search-modal-bar">
                <svg class="search-modal-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input class="search-modal-input" id="searchModalInput"
                       type="text" placeholder="Search players and teams…"
                       autocomplete="off" spellcheck="false" aria-label="Search">
                <button class="search-modal-close" id="searchModalClose" aria-label="Close search">✕</button>
            </div>
            <div class="search-modal-results" id="searchModalResults"></div>
            <div class="search-modal-footer">
                <span><kbd>↑↓</kbd> navigate</span>
                <span><kbd>↵</kbd> open</span>
                <span><kbd>Esc</kbd> close</span>
            </div>
        </div>
    </div>

    <!-- Bottom tab bar (mobile only, 5 primary destinations) -->
    <nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation">
        <button class="nav-tab" data-view="mlb-players">
            <span class="nav-icon">👤</span>
            <span class="bottom-nav-label">Players</span>
        </button>
        <button class="nav-tab" data-view="mlb-leaders">
            <span class="nav-icon">🏆</span>
            <span class="bottom-nav-label">Leaders</span>
        </button>
        <button class="nav-tab" data-view="mlb-games">
            <span class="nav-icon">📅</span>
            <span class="bottom-nav-label">Scores</span>
        </button>
        <button class="nav-tab" data-view="mlb-standings">
            <span class="nav-icon">📊</span>
            <span class="bottom-nav-label">Standings</span>
        </button>
        <button class="nav-tab" data-view="mlb-builder">
            <span class="nav-icon">🧮</span>
            <span class="bottom-nav-label">Builder</span>
        </button>
    </nav>

    <!-- Back to top button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <main>
        <!-- Search + filters — shown only on Players view -->
        <div class="search-container" id="searchBar">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchBox" placeholder="Search players by name or team…">
                <button class="search-clear" id="searchClear" style="display:none">✕</button>
            </div>
            <div class="search-meta">
                <p id="resultCount">Loading players…</p>
                <div class="view-toggle">
                    <button class="fav-filter-btn" id="favFilterBtn" onclick="toggleFavFilter()" title="Show favorites only">♥ Starred</button>
                    <button class="view-toggle-btn active" id="cardViewBtn" onclick="setPlayerView('cards')" title="Card view">⊞</button>
                    <button class="view-toggle-btn" id="tableViewBtn" onclick="setPlayerView('table')" title="Table view">≡</button>
                </div>
            </div>
        </div>

        <!-- Breadcrumb / status bar — shown on all non-search views -->
        <div class="view-header" id="viewHeader" style="display:none">
            <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
        </div>

        <div id="playersGrid" class="players-grid"></div>
    </main>

    <!-- math.js: safe formula evaluation in Stat Builder (never use eval()) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"
            integrity="sha512-VMIzok05yICztVJ0Pu2ZXHHz6Pe+fNONIcepOD3kzgL0SJG3GH4IO3DmBRO766hIWUOHIS/IWdSqRGWWzgzqRw=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Chart.js: data visualisation — loaded before charts.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
            integrity="sha384-NrKB+u6Ts6AtkIhwPixiKTzgSKNblyhlk0Sohlgar9UHUBzai/sgnNNWWd291xqt"
            crossorigin="anonymous"></script>

    <!-- App scripts — order matters (no bundler, no ES modules) -->
    <script src="js/config.js"></script>
    <script src="js/errorHandler.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/api.js"></script>
    <script src="js/glossary.js"></script>
    <script src="js/players.js"></script>
    <script src="js/leaderboards.js"></script>
    <script src="js/teams.js"></script>
    <script src="js/games.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/playerDetail.js"></script>
    <script src="js/statBuilder.js"></script>
    <script src="js/mlb.js"></script>
    <script src="js/nfl.js"></script>
    <script src="js/nhl.js"></script>
    <script src="js/arcade.js"></script>
    <script src="js/standings.js"></script>
    <script src="js/schema.js"></script>
    <script src="js/db.js"></script>
    <script src="js/search.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
