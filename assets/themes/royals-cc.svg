      <stop offset="0%" stop-color="#FF00AF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#FF00AF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF00AF" stop-opacity="0"/>
