<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 66 44">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#010916" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030E22" stop-opacity="1"/>
    </linearGradient>
    <!-- Gold stadium lights washing down from above -->
    <radialGradient id="stadium" cx="50%" cy="0%" r="75%">
      <stop offset="0%"   stop-color="#C09A5B" stop-opacity="0.52"/>
      <stop offset="45%"  stop-color="#C09A5B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C09A5B" stop-opacity="0"/>
    </radialGradient>
    <!-- Royal blue pool glow rising from the fountain basin -->
    <radialGradient id="pool" cx="50%" cy="115%" r="65%">
      <stop offset="0%"   stop-color="#004687" stop-opacity="0.92"/>
      <stop offset="48%"  stop-color="#004687" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#004687" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist">
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
  </defs>
  <!-- Deep navy sky -->
  <rect width="66" height="44" fill="url(#sky)"/>
  <!-- Royal blue pool glow -->
  <rect width="66" height="44" fill="url(#pool)"/>
  <!-- Gold stadium light wash -->
  <rect width="66" height="44" fill="url(#stadium)"/>
  <!-- Fountain arcs — water catching stadium light, blurred into mist -->
  <g filter="url(#mist)">
    <!-- Main crown arcs — tall center sprays catching the gold light -->
    <path d="M33,48 Q25,22 19,9 Q16,3 13,-1"  fill="none" stroke="#C09A5B" stroke-width="4.5" stroke-opacity="0.42"/>
    <path d="M33,48 Q41,22 47,9 Q50,3 53,-1"  fill="none" stroke="#C09A5B" stroke-width="4.5" stroke-opacity="0.42"/>
    <!-- White water spray — midair arcs -->
    <path d="M33,48 Q28,28 23,17 Q20,11 17,5"  fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-opacity="0.28"/>
    <path d="M33,48 Q38,28 43,17 Q46,11 49,5"  fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-opacity="0.28"/>
    <!-- Outer cascading sprays — powder blue -->
    <path d="M33,48 Q18,36 5,38"  fill="none" stroke="#B9D4F1" stroke-width="2" stroke-opacity="0.32"/>
    <path d="M33,48 Q48,36 61,38" fill="none" stroke="#B9D4F1" stroke-width="2" stroke-opacity="0.32"/>
    <!-- Royal blue basin mist churning at the base -->
    <path d="M0,44 Q16,38 33,36 Q50,38 66,44" fill="none" stroke="#004687" stroke-width="8" stroke-opacity="0.60"/>
  </g>
</svg>
