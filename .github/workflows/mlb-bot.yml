name: SportStrata Social Digest

# Generates ready-to-post draft posts as a downloadable artifact.
# Does NOT post to X — no API keys/secrets required. You post manually.

on:
  schedule:
    - cron: '0 11 * * *'    # ~7 AM ET — digest of yesterday's finals
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), blank = yesterday'
        required: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Restore history DB
        uses: actions/cache@v4
        with:
          path: bot/bot.db
          key: mlb-bot-db-${{ github.run_id }}
          restore-keys: mlb-bot-db-

      - name: Generate digest
        working-directory: bot
        run: |
          python digest.py ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }}

      - name: Save history DB
        uses: actions/cache@v4
        with:
          path: bot/bot.db
          key: mlb-bot-db-${{ github.run_id }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: sportstrata-digest
          path: bot/drafts/*.md
          if-no-files-found: warn
